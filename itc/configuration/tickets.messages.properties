tickets.messages.anon.update.body=Hello,\n\nYour support request #{1} just got a response from our support team:\n\n Your request is about:{2}\n\nThe following response has been provided:\n\n {3} \n\nFollow this link to answer {4}.\n\nThank you,\nYour favorite ticket-bot\n{0}.
