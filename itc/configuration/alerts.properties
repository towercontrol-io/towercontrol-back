# -----------------------------------------------
# Alerts module configuration
# -----------------------------------------------

# Alert template cache
# Maximum number of AlertTemplate entries kept in memory. 0 disables the cache.
alerts.template.cache.max.size=200
# Time-to-live in seconds for a cached AlertTemplate entry. 0 means entries never expire.
alerts.template.cache.expiration_s=0
# ISO-8601 duration between two cache stat log outputs (e.g. PT1H, PT24H). >= PT24H disables logging.
alerts.template.cache.log.period=PT24H

# Alert lifecycle
# Maximum age in milliseconds for ENDED alerts before they are purged (default: 7 days = 604800000).
alerts.max.retention.ms=604800000
# Maximum number of alert processing tasks running in parallel.
alerts.max.parallel.processing=5

# Alert direct link (usually public of not) / add the front url ; can be modified in the associated parameter
alerts.direct.link=${ALERTS_DIRECT_LINK:/alerts/!aid!/?key=!pubid!}
