# --- Ticket creation - message to admin
# {0} is replaced by the service name {1} is replaced by the target registration link
tickets.messages.creation.subject=[{0}] A new ticket has been created
tickets.messages.creation.body=Hello,\n\nA new ticket has been created (#{0}) with topic:\n\n{1}\n\nPlease login to get details and respond.\n\nThank you,\nYour favorite ticket-bot.
# --- Ticket update - message to admin
# {0} is replaced by the service name {1} is replaced by the ticket id {2} is replaced by the ticket subject {3} is replaced by the new comment
tickets.messages.admin.update.subject=[{0}] Ticket #{1} has been updated
tickets.messages.admin.update.body=Ticket #{1} just got an update for its owner:\n\nThe ticket topic is:{2}\n\n Author just add the following comment: \n\n {3} \n\nConnect the platform to respond it.\n\Thank you,\nYour favorite ticket-bot\n{0}.
# --- Ticket updated & closed - message to admin
# {0} is replaced by the service name {1} is replaced by the ticket id {2} is replaced by the ticket subject {3} is replaced by the new comment
tickets.messages.admin.close.subject=[{0}] Ticket #{1} has been closed
tickets.messages.admin.close.body=Ticket #{1} just got an update for its owner:\n\nThe ticket topic was:{2}\n\n Author just close the ticket and add the following comment - can be empty: \n\n {3} \n\nThank you,\nYour favorite ticket-bot\n{0}.
# --- Ticket updated - message to registered user
# {0} is replaced by the service name {1} is replaced by the ticket id {2} is replaced by the ticket subject {3} is replaced by the new comment
